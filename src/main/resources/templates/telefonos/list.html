<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"> <!--Carga del motor de plantillas para que reconozca el estilo-->
<head>
    <!--meta charset="UTF-8"-->
    <title>Lista de Telefonos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-3">Listado de Teléfonos</h2>
    <a th:href="@{/web/telefonos/new}" class="btn btn-primary me-2">
       Registrar Nuevo Telefono
    </a>
    <a th:href="@{/web/clientes}" class="btn btn-secondary">
        Volver a Clientes
    </a>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID Telefono</th>
            <th>Numero</th>
            <th>Cliente</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="telefono : ${telefonos}">
            <td th:text="${telefono.idTelefono}"></td>
            <td th:text="${telefono.telefono}"></td>
            <td th:text="${telefono.cliente != null ? telefono.cliente.nombre + ' ' + telefono.cliente.apellidoPaterno : 'N/A'}"></td>
            <td>
            <a th:href="@{/web/telefonos/edit/{id}(id=${telefono.idTelefono})}" class="btn btn-sm btn-info text-white">Editar</a>
            <a th:href="@{/web/telefonos/delete/{id}(id=${telefono.idTelefono})}" class="btn btn-sm btn-danger" onclick="return confirm('Eliminar este teléfono?');">Eliminar Telefono</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
