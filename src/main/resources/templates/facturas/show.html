<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalles de la Factura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body class="bg-light">
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-body">
            <div class="d-flex justify-content-between">
                <h3 class="mb-3"
                    th:text="'Factura No. '+ ${factura.idFactura}"></h3>
            </div>

            <hr>
            <div class="row 9-3">
                <div class="col-md-6">
                    <p><strong>ID cliente asociado:</strong>
                    <span th:text="${factura.cliente.idCliente}"></span>
                    </p>
                    <p><strong>Nombre cliente asociado:</strong>
                        <span th:text="${factura.cliente.nombre}+' '+${factura.cliente.apellidoPaterno}+' '+${factura.cliente.apellidoMaterno}"></span>
                    </p>
                    <p><strong>Monto total: </strong>
                        <span th:text="${factura.monto}"></span></p>
                    <p><strong>Estado de la factura: </strong>
                        <span th:text="${factura.activo == 1 ? 'CON ADEUDO' : 'PAGADO'}"></span></p>
                </div>
                    <div class="col-md-6">
                     <h5 class="mt-3">Pagos</h5>
                    <div th:if="${factura.pagos != null and !#lists.isEmpty(factura.pagos)}"></div>
                    <table class="table-bordered table-striped">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Monto</th>
                            <th>Fecha</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="t : ${factura.pagos}">
                        <td th:text="${t.idPago}"></td>
                        <td th:text="${t.monto}"></td>
                        <td th:text="${t.fechaPago}"></td>
                        </tbody>
                    </table>
                    <div th:each="pago : ${factura.pagos}"></div>
                </div>
            </div>

        </div>
    </div>

</div>
<a th:href="@{/web/facturas}" class="btn btn-secondary">Volver</a>
</body>
</html>
