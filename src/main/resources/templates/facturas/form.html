<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${action == 'new' ? 'Crear Factura' : 'Editar Factura'}">Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2 class="mb-4"
        th:text="${action == 'new' ? 'Registrar Nueva Factura' : 'Editar Factura'}"></h2>
    <form th:action="@{/web/facturas}"
          th:object="${factura}"
          method="post">

        <input type="hidden" th:field="*{idFactura}" />

        <div class="mb-3">
            <label class="form-label">Cliente Asociado:</label>
            <select th:field="*{cliente.idCliente}"
                    class="form-select"
                    required>
                <option value="">-- Seleccionar Cliente --</option>
                <option th:each="cli : ${clientes}"
                        th:value="${cli.idCliente}"
                        th:text="${cli.nombre + ' ' + cli.apellidoPaterno + ' ' + cli.apellidoMaterno}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Monto total de la factura</label>
            <input type="number"
                   th:field="*{monto}"
                   step="0.01"
                   min="0"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Folio</label>
            <input type="text"
                   th:field="*{folio}"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success"
                th:text="${action == 'new' ? 'Guardar' : 'Actualizar'}">
        </button>
        <a th:href="@{/web/facturas}"
           class="btn btn-secondary">
            Cancelar
        </a>
    </form>
</div>

</body>
</html>
