<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Facturas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        /* Filas inactivas atenuadas */
        .inactive {
            opacity: 0.6;
        }

        /* Efecto hover para todas las filas */
        tbody tr:hover {
            background-color: #f0f8ff;
        }

        /* Encabezados centrados */
        th {
            text-align: center;
        }

        /* Botones uniformes y espaciados */
        .action-btn {
            margin-right: 4px;
        }
    </style>
</head>
<body>
<div class="cotainer mt-5">
    <h2 class="mb-4">Listado de Facturas</h2>

    <div class="mb-3">
        <a th:href="@{/web/facturas/new}" class="btn btn-primary">
            Registrar Nueva Factura</a>
        <a th:href="@{/web/facturas}" class="btn btn-secondary">Todos</a>
        <a th:href="@{/web/facturas/activos}" class="btn btn-success">Activos</a>
        <a th:href="@{/web/facturas/inactivos}" class="btn btn-warning">Inactivos</a>
        <a th:href="@{/web/clientes}" class="btn btn-secondary">
            Volver a Clientes</a>
        <a th:href="@{/web/pagos}" class="btn btn-secondary">
            Pagos
        </a>
    </div>
    <table class="table table-striped table-hover mt-3">
        <thead class="table-dark">
        <tr>
        <th>Id Factura</th>
            <th>Id Cliente</th>
            <th>Monto Total</th>
            <th>Folio</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody class="text-center">
        <tr th:each="factura : ${facturas}" th:classappend="${factura.activo ==0} ?'inactive':''">
            <td th:text="${factura.idFactura}"></td>
            <td th:text="${factura.cliente != null ? factura.cliente.nombre + ' ' + factura.cliente.apellidoPaterno : 'N/A'}"></td>
            <td th:text="${factura.monto}"></td>
            <td th:text="${factura.folio}"></td>
            <td>
                <a th:href="@{/web/facturas/{id}(id=${factura.idFactura})}" class="btn btn-info btn-sm action-btn">Ver</a>
                <a th:href="@{/web/facturas/edit/{id}(id=${factura.idFactura})}" class="btn btn-sm btn-info text-white">Editar</a>
                <a th:if="${factura.activo == 1}" th:href="@{/web/facturas/inactivar/{id}(id=${factura.idFactura})}"
                   class="btn btn-warning btn-sm action-btn">Inactivar</a>
                <a th:if="${factura.activo == 0}" th:href="@{/web/facturas/activar/{id}(id=${factura.idFactura})}"
                   class="btn btn-success btn-sm action-btn">Activar</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
