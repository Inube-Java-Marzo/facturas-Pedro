<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${action == 'new' ? 'Registrar Pago' : 'Editar Pago'}">Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="mb-4" th:text="${action == 'new' ? 'Registrar Pago' : 'Editar Pago'}"></h3>

            <form th:action="@{/web/pagos}" th:object="${pago}" method="post">
                <input type="hidden" th:field="*{idPago}">

                <div class="mb-3">
                    <label class="form-label">Factura</label>
                    <select th:field="*{factura.idFactura}" class="form-select" required>
                        <option value="">-- Selecciona una factura --</option>
                        <option th:each="factura : ${facturas}"
                                th:value="${factura.idFactura}"
                                th:text="'Factura #' + ${factura.idFactura} + ' - Folio: ' + ${factura.folio}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Monto</label>
                    <input type="number"
                           th:field="*{monto}"
                           class="form-control"
                           min="0.01"
                           step="0.01"
                           required>
                </div>



                <button type="submit"
                        class="btn btn-success"
                        th:text="${action == 'new' ? 'Guardar Pago' : 'Actualizar Pago'}"></button>
                <a th:href="@{/web/pagos}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
